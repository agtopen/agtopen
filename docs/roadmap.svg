<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0A12"/><stop offset="100%" stop-color="#0F0F1A"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="960" height="340" fill="url(#bg)"/>
  <pattern id="d" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="20" cy="20" r="0.5" fill="#fff" opacity="0.05"/></pattern>
  <rect width="960" height="340" fill="url(#d)"/>

  <text x="480" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#E2E8F0" letter-spacing="2.5">ROADMAP</text>

  <!-- Timeline line -->
  <line x1="60" y1="90" x2="900" y2="90" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>
  <!-- Progress fill -->
  <line x1="60" y1="90" x2="460" y2="90" stroke="url(#prog)" stroke-width="3" stroke-linecap="round"/>
  <linearGradient id="prog" x1="60" y1="0" x2="460" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#10B981"/><stop offset="100%" stop-color="#06B6D4"/>
  </linearGradient>

  <!-- Phase 1 -->
  <circle cx="100" cy="90" r="10" fill="#10B981" filter="url(#s)"/>
  <text x="100" y="94" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff">1</text>
  <rect x="40" y="115" width="130" height="90" rx="10" fill="#10B981" opacity="0.1" stroke="#10B981" stroke-width="0.7"/>
  <text x="105" y="136" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#10B981">Protocol</text>
  <text x="105" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#10B981">Foundation</text>
  <text x="105" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#6EE7B7">SDK · API · 18 Agents</text>
  <text x="105" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#6EE7B7">243 Tests</text>
  <rect x="72" y="192" width="66" height="14" rx="7" fill="#10B981" opacity="0.2"/>
  <text x="105" y="202" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" font-weight="600" fill="#10B981">COMPLETE</text>

  <!-- Phase 2 -->
  <circle cx="260" cy="90" r="10" fill="#10B981" filter="url(#s)"/>
  <text x="260" y="94" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff">2</text>
  <rect x="195" y="115" width="130" height="90" rx="10" fill="#10B981" opacity="0.1" stroke="#10B981" stroke-width="0.7"/>
  <text x="260" y="136" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#10B981">On-Chain</text>
  <text x="260" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#10B981">Layer</text>
  <text x="260" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#6EE7B7">ZK Circuits · Contracts</text>
  <text x="260" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#6EE7B7">Staking · DAO</text>
  <rect x="227" y="192" width="66" height="14" rx="7" fill="#10B981" opacity="0.2"/>
  <text x="260" y="202" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" font-weight="600" fill="#10B981">COMPLETE</text>

  <!-- Phase 3 (active) -->
  <circle cx="420" cy="90" r="12" fill="#06B6D4" filter="url(#s)"/>
  <circle cx="420" cy="90" r="16" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.4"/>
  <text x="420" y="94" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff">3</text>
  <rect x="350" y="115" width="140" height="90" rx="10" fill="#06B6D4" opacity="0.12" stroke="#06B6D4" stroke-width="1"/>
  <text x="420" y="136" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#06B6D4">Platform</text>
  <text x="420" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#06B6D4">&amp; App</text>
  <text x="420" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#67E8F9">Web App · Predictions</text>
  <text x="420" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#67E8F9">Analytics · Dev Portal</text>
  <rect x="383" y="192" width="74" height="14" rx="7" fill="#06B6D4" opacity="0.25"/>
  <text x="420" y="202" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" font-weight="600" fill="#06B6D4">IN PROGRESS</text>

  <!-- Phase 4 -->
  <circle cx="580" cy="90" r="10" fill="#1e293b" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="580" y="94" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#F59E0B">4</text>
  <rect x="510" y="115" width="140" height="90" rx="10" fill="#F59E0B" opacity="0.06" stroke="#F59E0B" stroke-width="0.5" stroke-dasharray="4 2"/>
  <text x="580" y="136" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#F59E0B">Intelligence</text>
  <text x="580" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#F59E0B">Economy</text>
  <text x="580" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#FCD34D" opacity="0.7">Seasons · Breeding v2</text>
  <text x="580" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#FCD34D" opacity="0.7">Atoms Token · DAO</text>

  <!-- Phase 5 -->
  <circle cx="740" cy="90" r="10" fill="#1e293b" stroke="#A855F7" stroke-width="1.5"/>
  <text x="740" y="94" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#A855F7">5</text>
  <rect x="670" y="115" width="140" height="90" rx="10" fill="#A855F7" opacity="0.06" stroke="#A855F7" stroke-width="0.5" stroke-dasharray="4 2"/>
  <text x="740" y="136" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#A855F7">Scale &amp;</text>
  <text x="740" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#A855F7">Expansion</text>
  <text x="740" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#D8B4FE" opacity="0.7">Multi-chain · Mobile</text>
  <text x="740" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#D8B4FE" opacity="0.7">A2A Protocol · TEE</text>

  <!-- Phase 6 -->
  <circle cx="870" cy="90" r="10" fill="#1e293b" stroke="#EC4899" stroke-width="1.5"/>
  <text x="870" y="94" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#EC4899">6</text>
  <rect x="820" y="115" width="110" height="90" rx="10" fill="#EC4899" opacity="0.06" stroke="#EC4899" stroke-width="0.5" stroke-dasharray="4 2"/>
  <text x="875" y="136" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#EC4899">Autonomous</text>
  <text x="875" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#EC4899">Network</text>
  <text x="875" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#F9A8D4" opacity="0.7">Self-upgrading</text>
  <text x="875" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#F9A8D4" opacity="0.7">AI Governance</text>

  <!-- Legend -->
  <circle cx="320" cy="300" r="5" fill="#10B981"/><text x="332" y="304" font-family="system-ui,sans-serif" font-size="8" fill="#94A3B8">Complete</text>
  <circle cx="410" cy="300" r="5" fill="#06B6D4"/><text x="422" y="304" font-family="system-ui,sans-serif" font-size="8" fill="#94A3B8">In Progress</text>
  <circle cx="510" cy="300" r="5" fill="#1e293b" stroke="#F59E0B" stroke-width="1"/><text x="522" y="304" font-family="system-ui,sans-serif" font-size="8" fill="#94A3B8">Planned</text>
  <circle cx="590" cy="300" r="5" fill="#1e293b" stroke="#EC4899" stroke-width="1"/><text x="602" y="304" font-family="system-ui,sans-serif" font-size="8" fill="#94A3B8">Vision</text>
</svg>
