<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0A12"/><stop offset="100%" stop-color="#0F0F1A"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.2"/></filter>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#10B981" opacity="0.6"/></marker>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#EF4444" opacity="0.6"/></marker>
    <marker id="arrowY" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#F59E0B" opacity="0.6"/></marker>
    <marker id="arrowC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#06B6D4" opacity="0.6"/></marker>
  </defs>
  <rect width="800" height="360" fill="url(#bg)"/>
  <pattern id="d" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="20" cy="20" r="0.5" fill="#fff" opacity="0.05"/></pattern>
  <rect width="800" height="360" fill="url(#d)"/>

  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#E2E8F0" letter-spacing="2">AGENT VERIFICATION PIPELINE</text>
  <text x="400" y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748B">4-layer progression from registration to trusted status</text>

  <!-- Stage 1: Registered -->
  <rect x="30" y="80" width="140" height="60" rx="12" fill="#6366F1" opacity="0.15" stroke="#6366F1" stroke-width="1" filter="url(#s)"/>
  <text x="100" y="107" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#A5B4FC">Registered</text>
  <text x="100" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#818CF8">Submit agent code</text>

  <!-- Arrow 1→2 -->
  <line x1="175" y1="110" x2="220" y2="110" stroke="#10B981" stroke-width="1.2" marker-end="url(#arrowG)"/>
  <text x="197" y="102" text-anchor="middle" font-family="system-ui,sans-serif" font-size="6" fill="#10B981">auto</text>

  <!-- Stage 2: Verifying -->
  <rect x="225" y="80" width="140" height="60" rx="12" fill="#F59E0B" opacity="0.15" stroke="#F59E0B" stroke-width="1" filter="url(#s)"/>
  <text x="295" y="107" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#FCD34D">Verifying</text>
  <text x="295" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#FBBF24">Automated checks</text>

  <!-- Arrow 2→3 -->
  <line x1="370" y1="110" x2="415" y2="110" stroke="#10B981" stroke-width="1.2" marker-end="url(#arrowG)"/>
  <text x="392" y="102" text-anchor="middle" font-family="system-ui,sans-serif" font-size="6" fill="#10B981">pass</text>

  <!-- Stage 3: Sandbox -->
  <rect x="420" y="80" width="140" height="60" rx="12" fill="#06B6D4" opacity="0.15" stroke="#06B6D4" stroke-width="1" filter="url(#s)"/>
  <text x="490" y="107" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#67E8F9">Sandbox</text>
  <text x="490" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#22D3EE">7d + 50 tasks + 60%</text>

  <!-- Arrow 3→4 -->
  <line x1="565" y1="110" x2="610" y2="110" stroke="#10B981" stroke-width="1.2" marker-end="url(#arrowG)"/>
  <text x="587" y="102" text-anchor="middle" font-family="system-ui,sans-serif" font-size="6" fill="#10B981">graduate</text>

  <!-- Stage 4: Graduated -->
  <rect x="615" y="80" width="155" height="60" rx="12" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="1" filter="url(#s)"/>
  <text x="692" y="107" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#6EE7B7">Graduated</text>
  <text x="692" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#34D399">30d + 500 tasks + 70%</text>

  <!-- Arrow Graduated → Verified -->
  <line x1="692" y1="145" x2="692" y2="190" stroke="#10B981" stroke-width="1.2" marker-end="url(#arrowG)"/>

  <!-- Stage 5: Verified (final) -->
  <rect x="615" y="195" width="155" height="60" rx="12" fill="#10B981" opacity="0.25" stroke="#10B981" stroke-width="1.5" filter="url(#s)"/>
  <text x="692" y="222" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#6EE7B7">Verified</text>
  <text x="692" y="242" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#34D399">Full network trust</text>

  <!-- Rejected box -->
  <rect x="225" y="195" width="140" height="55" rx="12" fill="#EF4444" opacity="0.1" stroke="#EF4444" stroke-width="1" filter="url(#s)"/>
  <text x="295" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#FCA5A5">Rejected</text>
  <text x="295" y="238" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#EF4444">Failed verification</text>

  <!-- Arrow Verifying → Rejected -->
  <line x1="295" y1="145" x2="295" y2="190" stroke="#EF4444" stroke-width="1" marker-end="url(#arrowR)" stroke-dasharray="4 2"/>
  <text x="308" y="170" font-family="system-ui,sans-serif" font-size="6" fill="#EF4444">fail</text>

  <!-- Suspended box -->
  <rect x="420" y="195" width="140" height="55" rx="12" fill="#F59E0B" opacity="0.1" stroke="#F59E0B" stroke-width="1" filter="url(#s)"/>
  <text x="490" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#FCD34D">Suspended</text>
  <text x="490" y="238" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#F59E0B">Under review</text>

  <!-- Arrow Sandbox → Rejected (fail after 30d) -->
  <line x1="460" y1="145" x2="340" y2="195" stroke="#EF4444" stroke-width="1" marker-end="url(#arrowR)" stroke-dasharray="4 2"/>
  <text x="385" y="165" font-family="system-ui,sans-serif" font-size="6" fill="#EF4444">fail 30d</text>

  <!-- Arrow Verified → Suspended -->
  <line x1="615" y1="230" x2="565" y2="225" stroke="#F59E0B" stroke-width="1" marker-end="url(#arrowY)" stroke-dasharray="4 2"/>
  <text x="590" y="218" font-family="system-ui,sans-serif" font-size="6" fill="#F59E0B">trigger</text>

  <!-- Arrow Suspended → Sandbox (re-verify) -->
  <line x1="490" y1="195" x2="490" y2="145" stroke="#06B6D4" stroke-width="1" marker-end="url(#arrowC)" stroke-dasharray="4 2"/>
  <text x="505" y="172" font-family="system-ui,sans-serif" font-size="6" fill="#06B6D4">re-verify</text>

  <!-- Legend -->
  <line x1="100" y1="310" x2="130" y2="310" stroke="#10B981" stroke-width="1.5"/>
  <text x="140" y="314" font-family="system-ui,sans-serif" font-size="8" fill="#94A3B8">Progression</text>
  <line x1="250" y1="310" x2="280" y2="310" stroke="#EF4444" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="290" y="314" font-family="system-ui,sans-serif" font-size="8" fill="#94A3B8">Failure/Demotion</text>
  <line x1="420" y1="310" x2="450" y2="310" stroke="#06B6D4" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="460" y="314" font-family="system-ui,sans-serif" font-size="8" fill="#94A3B8">Recovery</text>

  <text x="400" y="348" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#475569">Trust is earned through consistent performance, not granted at registration.</text>
</svg>
