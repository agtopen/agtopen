<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" width="960" height="320">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A12"/>
      <stop offset="100%" stop-color="#0F0F1A"/>
    </linearGradient>
    <linearGradient id="arrow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="arrow2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="arrow3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="arrow4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="glowIndigo" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#6366F1" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#06B6D4" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowEmerald" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#10B981" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowAmber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#F59E0B" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#A855F7" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="ah1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#06B6D4"/>
    </marker>
    <marker id="ah2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#10B981"/>
    </marker>
    <marker id="ah3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#F59E0B"/>
    </marker>
    <marker id="ah4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#A855F7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="320" fill="url(#bgGrad)"/>

  <!-- Connecting arrows -->
  <line x1="188" y1="145" x2="208" y2="145" stroke="url(#arrow1)" stroke-width="2" marker-end="url(#ah1)"/>
  <line x1="370" y1="145" x2="390" y2="145" stroke="url(#arrow2)" stroke-width="2" marker-end="url(#ah2)"/>
  <line x1="552" y1="145" x2="572" y2="145" stroke="url(#arrow3)" stroke-width="2" marker-end="url(#ah3)"/>
  <line x1="734" y1="145" x2="754" y2="145" stroke="url(#arrow4)" stroke-width="2" marker-end="url(#ah4)"/>

  <!-- Step 1: Prime Directive (Indigo) -->
  <g filter="url(#glowIndigo)">
    <rect x="26" y="40" width="160" height="210" rx="12" ry="12" fill="#12122A" stroke="#6366F1" stroke-width="1.5"/>
  </g>
  <circle cx="46" cy="58" r="11" fill="#6366F1"/>
  <text x="46" y="63" text-anchor="middle" fill="#0A0A12" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">1</text>
  <g transform="translate(106, 80)">
    <polygon points="0,-18 -6,2 2,0 -2,18 8,-2 0,0" fill="#6366F1" opacity="0.9"/>
  </g>
  <text x="106" y="122" text-anchor="middle" fill="#E0E0FF" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">Prime Directive</text>
  <text x="106" y="148" text-anchor="middle" fill="#9CA3C0" font-family="system-ui, -apple-system, sans-serif" font-size="10">Define agent mission</text>
  <text x="106" y="166" text-anchor="middle" fill="#6B7199" font-family="system-ui, -apple-system, sans-serif" font-size="9">Natural language &#x2192; JSON</text>
  <line x1="46" y1="182" x2="166" y2="182" stroke="#6366F1" stroke-width="0.5" opacity="0.3"/>
  <rect x="56" y="192" width="100" height="22" rx="4" fill="#6366F120"/>
  <text x="106" y="207" text-anchor="middle" fill="#6366F1" font-family="system-ui, -apple-system, sans-serif" font-size="8" opacity="0.7">MISSION CORE</text>

  <!-- Step 2: Data Diet (Cyan) -->
  <g filter="url(#glowCyan)">
    <rect x="208" y="40" width="160" height="210" rx="12" ry="12" fill="#0A1A1F" stroke="#06B6D4" stroke-width="1.5"/>
  </g>
  <circle cx="228" cy="58" r="11" fill="#06B6D4"/>
  <text x="228" y="63" text-anchor="middle" fill="#0A0A12" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">2</text>
  <g transform="translate(288, 82)">
    <line x1="0" y1="8" x2="0" y2="-10" stroke="#06B6D4" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="-12" r="3" fill="none" stroke="#06B6D4" stroke-width="1.2"/>
    <path d="M-10,-6 A14,14 0 0,1 10,-6" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.6"/>
    <path d="M-16,-2 A22,22 0 0,1 16,-2" fill="none" stroke="#06B6D4" stroke-width="0.8" opacity="0.35"/>
  </g>
  <text x="288" y="122" text-anchor="middle" fill="#E0FFFF" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">Data Diet</text>
  <text x="288" y="148" text-anchor="middle" fill="#9CC3C0" font-family="system-ui, -apple-system, sans-serif" font-size="10">Select data sources</text>
  <text x="288" y="166" text-anchor="middle" fill="#6B9999" font-family="system-ui, -apple-system, sans-serif" font-size="9">APIs, feeds, oracles</text>
  <line x1="228" y1="182" x2="348" y2="182" stroke="#06B6D4" stroke-width="0.5" opacity="0.3"/>
  <rect x="238" y="192" width="100" height="22" rx="4" fill="#06B6D420"/>
  <text x="288" y="207" text-anchor="middle" fill="#06B6D4" font-family="system-ui, -apple-system, sans-serif" font-size="8" opacity="0.7">INPUT LAYER</text>

  <!-- Step 3: Action Blueprint (Emerald) -->
  <g filter="url(#glowEmerald)">
    <rect x="390" y="40" width="160" height="210" rx="12" ry="12" fill="#0A1A14" stroke="#10B981" stroke-width="1.5"/>
  </g>
  <circle cx="410" cy="58" r="11" fill="#10B981"/>
  <text x="410" y="63" text-anchor="middle" fill="#0A0A12" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">3</text>
  <g transform="translate(470, 82)">
    <circle cx="0" cy="0" r="7" fill="none" stroke="#10B981" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3" fill="#10B981" opacity="0.4"/>
    <line x1="0" y1="-11" x2="0" y2="-7" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="7" x2="0" y2="11" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-11" y1="0" x2="-7" y2="0" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="7" y1="0" x2="11" y2="0" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-8" y1="-8" x2="-5" y2="-5" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="5" y1="5" x2="8" y2="8" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="5" y1="-5" x2="8" y2="-8" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-8" y1="8" x2="-5" y2="5" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="470" y="122" text-anchor="middle" fill="#E0FFF0" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">Action Blueprint</text>
  <text x="470" y="148" text-anchor="middle" fill="#9CC0B0" font-family="system-ui, -apple-system, sans-serif" font-size="10">Configure actions</text>
  <text x="470" y="166" text-anchor="middle" fill="#6B9980" font-family="system-ui, -apple-system, sans-serif" font-size="9">Trade, alert, report</text>
  <line x1="410" y1="182" x2="530" y2="182" stroke="#10B981" stroke-width="0.5" opacity="0.3"/>
  <rect x="420" y="192" width="100" height="22" rx="4" fill="#10B98120"/>
  <text x="470" y="207" text-anchor="middle" fill="#10B981" font-family="system-ui, -apple-system, sans-serif" font-size="8" opacity="0.7">LOGIC ENGINE</text>

  <!-- Step 4: Hyperparameters (Amber) -->
  <g filter="url(#glowAmber)">
    <rect x="572" y="40" width="160" height="210" rx="12" ry="12" fill="#1A150A" stroke="#F59E0B" stroke-width="1.5"/>
  </g>
  <circle cx="592" cy="58" r="11" fill="#F59E0B"/>
  <text x="592" y="63" text-anchor="middle" fill="#0A0A12" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">4</text>
  <g transform="translate(652, 82)">
    <line x1="-14" y1="-8" x2="14" y2="-8" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <circle cx="-4" cy="-8" r="3.5" fill="#F59E0B"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <circle cx="6" cy="0" r="3.5" fill="#F59E0B"/>
    <line x1="-14" y1="8" x2="14" y2="8" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <circle cx="-1" cy="8" r="3.5" fill="#F59E0B"/>
  </g>
  <text x="652" y="122" text-anchor="middle" fill="#FFF5E0" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">Hyperparameters</text>
  <text x="652" y="148" text-anchor="middle" fill="#C0B09C" font-family="system-ui, -apple-system, sans-serif" font-size="10">Tune risk &amp; speed</text>
  <text x="652" y="166" text-anchor="middle" fill="#99806B" font-family="system-ui, -apple-system, sans-serif" font-size="9">Confidence thresholds</text>
  <line x1="592" y1="182" x2="712" y2="182" stroke="#F59E0B" stroke-width="0.5" opacity="0.3"/>
  <rect x="602" y="192" width="100" height="22" rx="4" fill="#F59E0B20"/>
  <text x="652" y="207" text-anchor="middle" fill="#F59E0B" font-family="system-ui, -apple-system, sans-serif" font-size="8" opacity="0.7">FINE TUNING</text>

  <!-- Step 5: Deploy (Purple) -->
  <g filter="url(#glowPurple)">
    <rect x="754" y="40" width="160" height="210" rx="12" ry="12" fill="#150A1A" stroke="#A855F7" stroke-width="1.5"/>
  </g>
  <circle cx="774" cy="58" r="11" fill="#A855F7"/>
  <text x="774" y="63" text-anchor="middle" fill="#0A0A12" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">5</text>
  <g transform="translate(834, 80)">
    <path d="M0,-16 C4,-14 5,-6 4,2 L-4,2 C-5,-6 -4,-14 0,-16Z" fill="#A855F7" opacity="0.9"/>
    <ellipse cx="0" cy="-16" rx="2" ry="3" fill="#A855F7"/>
    <path d="M-4,0 L-9,6 L-4,4Z" fill="#A855F7" opacity="0.6"/>
    <path d="M4,0 L9,6 L4,4Z" fill="#A855F7" opacity="0.6"/>
    <path d="M-3,2 Q0,10 3,2" fill="#F59E0B" opacity="0.7"/>
    <path d="M-1.5,2 Q0,7 1.5,2" fill="#FF6B6B" opacity="0.5"/>
    <circle cx="0" cy="-8" r="2" fill="#0A0A12" opacity="0.6"/>
  </g>
  <text x="834" y="122" text-anchor="middle" fill="#F0E0FF" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">Deploy</text>
  <text x="834" y="148" text-anchor="middle" fill="#B09CC0" font-family="system-ui, -apple-system, sans-serif" font-size="10">Launch to network</text>
  <text x="834" y="166" text-anchor="middle" fill="#806B99" font-family="system-ui, -apple-system, sans-serif" font-size="9">Real-time monitoring</text>
  <line x1="774" y1="182" x2="894" y2="182" stroke="#A855F7" stroke-width="0.5" opacity="0.3"/>
  <rect x="784" y="192" width="100" height="22" rx="4" fill="#A855F720"/>
  <text x="834" y="207" text-anchor="middle" fill="#A855F7" font-family="system-ui, -apple-system, sans-serif" font-size="8" opacity="0.7">LIVE NETWORK</text>

  <!-- Bottom tagline -->
  <text x="480" y="290" text-anchor="middle" fill="#4A4A6A" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" letter-spacing="3">Zero code. Five steps. Deploy in minutes.</text>
  <line x1="300" y1="302" x2="660" y2="302" stroke="url(#arrow1)" stroke-width="0.5" opacity="0.3"/>
</svg>
