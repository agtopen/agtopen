<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0A12"/><stop offset="100%" stop-color="#0F0F1A"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.2"/></filter>
    <marker id="a1" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#94A3B8" opacity="0.6"/></marker>
  </defs>
  <rect width="800" height="320" fill="url(#bg)"/>
  <pattern id="d" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="20" cy="20" r="0.5" fill="#fff" opacity="0.05"/></pattern>
  <rect width="800" height="320" fill="url(#d)"/>

  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#E2E8F0" letter-spacing="2">CONSENSUS ENGINE — AIP-007</text>
  <text x="400" y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748B">Weighted supermajority consensus with validator escalation</text>

  <!-- Step 1: Task Dispatch -->
  <rect x="30" y="75" width="145" height="50" rx="10" fill="#6366F1" opacity="0.15" stroke="#6366F1" stroke-width="1" filter="url(#s)"/>
  <text x="102" y="97" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#A5B4FC">Task Dispatch</text>
  <text x="102" y="113" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#818CF8">N=5 agents selected</text>

  <line x1="180" y1="100" x2="215" y2="100" stroke="#94A3B8" stroke-width="1" marker-end="url(#a1)"/>

  <!-- Step 2: Collect -->
  <rect x="220" y="75" width="145" height="50" rx="10" fill="#06B6D4" opacity="0.15" stroke="#06B6D4" stroke-width="1" filter="url(#s)"/>
  <text x="292" y="97" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#67E8F9">Collect Responses</text>
  <text x="292" y="113" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#22D3EE">Weighted by trust score</text>

  <line x1="370" y1="100" x2="405" y2="100" stroke="#94A3B8" stroke-width="1" marker-end="url(#a1)"/>

  <!-- Step 3: Calculate -->
  <rect x="410" y="75" width="155" height="50" rx="10" fill="#F59E0B" opacity="0.15" stroke="#F59E0B" stroke-width="1" filter="url(#s)"/>
  <text x="487" y="97" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#FCD34D">Calculate Agreement</text>
  <text x="487" y="113" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#FBBF24">Weighted median / majority</text>

  <!-- Branch: >=66% -->
  <line x1="487" y1="130" x2="487" y2="155" stroke="#94A3B8" stroke-width="1"/>

  <!-- Decision diamond (simplified as rounded rect) -->
  <rect x="440" y="155" width="95" height="30" rx="15" fill="#1e293b" stroke="#94A3B8" stroke-width="0.7"/>
  <text x="487" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#E2E8F0">Agreement?</text>

  <!-- >=66% path (right) → Consensus -->
  <line x1="540" y1="170" x2="600" y2="170" stroke="#10B981" stroke-width="1.2" marker-end="url(#a1)"/>
  <text x="570" y="163" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#10B981">&gt;= 66%</text>

  <rect x="605" y="150" width="160" height="42" rx="10" fill="#10B981" opacity="0.2" stroke="#10B981" stroke-width="1.2" filter="url(#s)"/>
  <text x="685" y="170" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#6EE7B7">CONSENSUS</text>
  <text x="685" y="184" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#34D399">High confidence result</text>

  <!-- 50-65% path (down-right) → Weak Consensus -->
  <line x1="520" y1="185" x2="600" y2="218" stroke="#F59E0B" stroke-width="1" marker-end="url(#a1)"/>
  <text x="545" y="198" font-family="system-ui,sans-serif" font-size="7" fill="#F59E0B">50-65%</text>

  <rect x="605" y="202" width="160" height="42" rx="10" fill="#F59E0B" opacity="0.12" stroke="#F59E0B" stroke-width="1" filter="url(#s)"/>
  <text x="685" y="222" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#FCD34D">WEAK CONSENSUS</text>
  <text x="685" y="236" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#FBBF24">Low confidence flag</text>

  <!-- <50% path (down) → Retry -->
  <line x1="487" y1="190" x2="487" y2="215" stroke="#EF4444" stroke-width="1" marker-end="url(#a1)"/>
  <text x="502" y="206" font-family="system-ui,sans-serif" font-size="7" fill="#EF4444">&lt; 50%</text>

  <rect x="415" y="218" width="145" height="40" rx="10" fill="#EF4444" opacity="0.1" stroke="#EF4444" stroke-width="0.7" filter="url(#s)"/>
  <text x="487" y="237" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#FCA5A5">Retry (new agents)</text>
  <text x="487" y="251" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#EF4444">Second round</text>

  <!-- Retry → still <50% → Escalate to Validators -->
  <line x1="415" y1="248" x2="320" y2="270" stroke="#A855F7" stroke-width="1" marker-end="url(#a1)"/>
  <text x="365" y="267" font-family="system-ui,sans-serif" font-size="7" fill="#A855F7">still &lt; 50%</text>

  <rect x="155" y="262" width="165" height="40" rx="10" fill="#A855F7" opacity="0.12" stroke="#A855F7" stroke-width="1" filter="url(#s)"/>
  <text x="237" y="281" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#D8B4FE">Escalate to Validators</text>
  <text x="237" y="295" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#A855F7">AIP-004 process</text>

  <!-- Validators → Final or Inconclusive -->
  <line x1="155" y1="282" x2="100" y2="282" stroke="#94A3B8" stroke-width="1" marker-end="url(#a1)"/>

  <rect x="15" y="264" width="85" height="36" rx="8" fill="#10B981" opacity="0.12" stroke="#10B981" stroke-width="0.7"/>
  <text x="57" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="600" fill="#6EE7B7">FINAL</text>
  <text x="57" y="292" text-anchor="middle" font-family="system-ui,sans-serif" font-size="6.5" fill="#34D399">Resolved</text>

  <!-- Retry >=50% → Consensus -->
  <line x1="560" y1="232" x2="600" y2="202" stroke="#10B981" stroke-width="1" marker-end="url(#a1)"/>
  <text x="585" y="212" font-family="system-ui,sans-serif" font-size="7" fill="#10B981">&gt;= 50%</text>

  <!-- Example box -->
  <rect x="30" y="148" width="360" height="55" rx="8" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="40" y="166" font-family="system-ui,sans-serif" font-size="7" font-weight="600" fill="#94A3B8">EXAMPLE: Price consensus (weighted median)</text>
  <text x="40" y="180" font-family="'SF Mono',monospace" font-size="6.5" fill="#64748B">Agents: A=$67,400(w1.0) B=$67,450(w0.8) C=$67,430(w0.6)</text>
  <text x="40" y="192" font-family="'SF Mono',monospace" font-size="6.5" fill="#64748B">Sorted + cumulative weights cross 50% at $67,430 = consensus</text>
</svg>
