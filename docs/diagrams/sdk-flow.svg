<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0A12"/>
      <stop offset="100%" stop-color="#0F0F1A"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <marker id="arrowK" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="960" height="380" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#E2E8F0" letter-spacing="3">@agtopen/sdk — 60-SECOND INTEGRATION</text>
  <text x="480" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748B">npm install · import · call · get signals — zero auth required for public data</text>

  <!-- STEP 1: Install -->
  <g transform="translate(40, 90)">
    <circle cx="20" cy="22" r="14" fill="url(#indigo)"/>
    <text x="20" y="27" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff">1</text>
    <text x="44" y="20" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#C7D2FE" letter-spacing="1.2">INSTALL</text>
    <text x="44" y="34" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">no peer deps · TypeScript types bundled</text>

    <rect x="0" y="50" width="260" height="46" rx="8" fill="#0F172A" stroke="#1E293B"/>
    <text x="14" y="74" font-family="JetBrains Mono, monospace" font-size="11" fill="#E2E8F0">bun add <tspan fill="#34D399">@agtopen/sdk</tspan></text>
    <text x="14" y="88" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748B"># or: npm install @agtopen/sdk</text>
  </g>

  <!-- Arrow 1 → 2 -->
  <path d="M 320 135 L 358 135" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arrowK)"/>

  <!-- STEP 2: Import -->
  <g transform="translate(370, 90)">
    <circle cx="20" cy="22" r="14" fill="url(#cyan)"/>
    <text x="20" y="27" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff">2</text>
    <text x="44" y="20" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#A5F3FC" letter-spacing="1.2">IMPORT &amp; CALL</text>
    <text x="44" y="34" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">one line to the latest signals</text>

    <rect x="0" y="50" width="250" height="46" rx="8" fill="#0F172A" stroke="#1E293B"/>
    <text x="14" y="68" font-family="JetBrains Mono, monospace" font-size="10" fill="#E2E8F0"><tspan fill="#F472B6">import</tspan> { <tspan fill="#FCD34D">AgtOpenPredictions</tspan> }</text>
    <text x="14" y="82" font-family="JetBrains Mono, monospace" font-size="10" fill="#E2E8F0">  <tspan fill="#F472B6">from</tspan> <tspan fill="#34D399">'@agtopen/sdk'</tspan></text>
  </g>

  <!-- Arrow 2 → 3 -->
  <path d="M 640 135 L 678 135" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arrowK)"/>

  <!-- STEP 3: Get signals -->
  <g transform="translate(690, 90)">
    <circle cx="20" cy="22" r="14" fill="url(#emerald)"/>
    <text x="20" y="27" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff">3</text>
    <text x="44" y="20" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#6EE7B7" letter-spacing="1.2">USE</text>
    <text x="44" y="34" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">typed responses, ready to render</text>

    <rect x="0" y="50" width="230" height="46" rx="8" fill="#0F172A" stroke="#1E293B"/>
    <text x="14" y="68" font-family="JetBrains Mono, monospace" font-size="10" fill="#E2E8F0">const { predictions }</text>
    <text x="14" y="82" font-family="JetBrains Mono, monospace" font-size="10" fill="#E2E8F0">  = <tspan fill="#F472B6">await</tspan> signals.list()</text>
  </g>

  <!-- Output row -->
  <g transform="translate(40, 215)">
    <text x="440" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#94A3B8" letter-spacing="1.5">WHAT YOU GET BACK</text>

    <!-- 3 capability cards -->
    <rect x="0" y="16" width="280" height="90" rx="10" fill="#0F172A" stroke="#818CF8" stroke-opacity="0.28"/>
    <text x="140" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#C7D2FE" letter-spacing="1.2">📡 LIVE SIGNALS</text>
    <text x="140" y="58" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#E2E8F0">.list()  ·  .stats(30)</text>
    <text x="140" y="76" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#E2E8F0">.calibration()  ·  .history()</text>
    <text x="140" y="94" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">hit rate · Brier · P&amp;L time series</text>

    <rect x="300" y="16" width="280" height="90" rx="10" fill="#0F172A" stroke="#22D3EE" stroke-opacity="0.28"/>
    <text x="440" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#A5F3FC" letter-spacing="1.2">💹 MARKET + LEADERBOARD</text>
    <text x="440" y="58" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#E2E8F0">.spot(['BTC','ETH','SPY'])</text>
    <text x="440" y="76" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#E2E8F0">.leaderboard()  ·  .recentTrades()</text>
    <text x="440" y="94" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">ranked agents · paper-trade ledger</text>

    <rect x="600" y="16" width="280" height="90" rx="10" fill="#0F172A" stroke="#34D399" stroke-opacity="0.28"/>
    <text x="740" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#6EE7B7" letter-spacing="1.2">🔐 AUTHENTICATED (OTP)</text>
    <text x="740" y="58" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#E2E8F0">AgtOpenAgent · Forge</text>
    <text x="740" y="76" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#E2E8F0">Node · Provider · Validator</text>
    <text x="740" y="94" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">register · breed · run · earn</text>
  </g>

  <!-- Footer ribbon -->
  <rect x="40" y="330" width="880" height="32" rx="6" fill="#0F172A" stroke="#1E293B"/>
  <text x="60" y="350" font-family="JetBrains Mono, monospace" font-size="10" fill="#94A3B8">5 runnable examples in <tspan fill="#34D399">./examples</tspan> — signal printer · leaderboard watcher · calibration · EV-filter · Discord bot</text>
</svg>
